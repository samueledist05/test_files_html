<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Docenti — Università di Pisa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #f5f3ee;
    --surface:  #ffffff;
    --surface2: #f0ede6;
    --border:   #ddd9d0;
    --text:     #1a1814;
    --muted:    #6b6760;
    --faint:    #a09c96;
    --accent:   #003c72;
    --accent2:  #c8742a;
    --tag1-bg:  #dbeafe;  --tag1-fg: #1e40af;
    --tag2-bg:  #d1fae5;  --tag2-fg: #065f46;
    --tag3-bg:  #fef3c7;  --tag3-fg: #92400e;
    --tag4-bg:  #ede9fe;  --tag4-fg: #5b21b6;
    --tag5-bg:  #fce7f3;  --tag5-fg: #9d174d;
    --radius:   10px;
    --shadow:   0 2px 12px rgba(0,0,0,.07);
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg:       #14120e;
      --surface:  #1e1c18;
      --surface2: #28261f;
      --border:   #3a3830;
      --text:     #f0ede6;
      --muted:    #9e9a92;
      --faint:    #5e5c56;
      --accent:   #5b9bd5;
      --accent2:  #e89a52;
      --tag1-bg:  #1e3a5f;  --tag1-fg: #93c5fd;
      --tag2-bg:  #064e3b;  --tag2-fg: #6ee7b7;
      --tag3-bg:  #78350f;  --tag3-fg: #fde68a;
      --tag4-bg:  #3b0764;  --tag4-fg: #c4b5fd;
      --tag5-bg:  #500724;  --tag5-fg: #fbcfe8;
    }
  }

  html { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px; min-height: 100vh; }

  .page { max-width: 960px; margin: 0 auto; padding: 48px 24px 80px; }

  /* Header */
  header { margin-bottom: 48px; }
  .logo-row { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
  .logo-mark { width: 36px; height: 36px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .logo-mark span { color: #fff; font-family: 'EB Garamond', serif; font-size: 18px; font-weight: 500; }
  .logo-text { font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 400; color: var(--muted); line-height: 1.3; }
  .logo-text strong { color: var(--text); font-weight: 500; display: block; font-size: 14px; }

  h1 { font-family: 'EB Garamond', serif; font-size: clamp(28px, 5vw, 42px); font-weight: 400; line-height: 1.15; color: var(--text); margin-bottom: 10px; letter-spacing: -.01em; }
  h1 em { font-style: italic; color: var(--accent); }
  .subtitle { font-size: 14px; color: var(--muted); font-weight: 300; }

  /* Divider */
  .divider { height: 1px; background: var(--border); margin: 32px 0; }

  /* Search box */
  .search-wrap { position: relative; margin-bottom: 8px; }
  .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--faint); pointer-events: none; }
  #corso-search {
    width: 100%; padding: 13px 14px 13px 42px;
    background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius);
    font-family: 'DM Sans', sans-serif; font-size: 15px; color: var(--text);
    outline: none; transition: border-color .15s, box-shadow .15s;
  }
  #corso-search::placeholder { color: var(--faint); }
  #corso-search:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,60,114,.08); }

  /* Dropdown list */
  #dropdown {
    display: none; position: absolute; z-index: 100; left: 0; right: 0; top: calc(100% + 6px);
    background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius);
    box-shadow: var(--shadow); max-height: 340px; overflow-y: auto;
  }
  #dropdown.open { display: block; }
  .dd-item {
    padding: 11px 16px; cursor: pointer; transition: background .1s;
    border-bottom: 1px solid var(--border); font-size: 14px; line-height: 1.4;
  }
  .dd-item:last-child { border-bottom: none; }
  .dd-item:hover, .dd-item.focused { background: var(--surface2); }
  .dd-item .tipo { font-size: 11px; color: var(--faint); font-weight: 400; margin-top: 1px; }
  .dd-empty { padding: 20px 16px; text-align: center; color: var(--muted); font-size: 14px; }

  /* Selected course chip */
  #selected-course {
    display: none; margin-top: 10px; padding: 10px 14px;
    background: var(--tag1-bg); border-radius: 8px;
    font-size: 13px; color: var(--tag1-fg); font-weight: 500;
    display: flex; align-items: center; justify-content: space-between; gap: 8px;
  }
  #selected-course.hidden { display: none; }
  #selected-course button {
    background: none; border: none; cursor: pointer; color: var(--tag1-fg); font-size: 16px;
    line-height: 1; padding: 0 2px; opacity: .7;
  }
  #selected-course button:hover { opacity: 1; }

  /* Loading state */
  .loader { display: flex; align-items: center; gap: 10px; color: var(--muted); font-size: 14px; padding: 32px 0; }
  .spinner {
    width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--accent);
    border-radius: 50%; animation: spin .7s linear infinite; flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Error */
  .error-box {
    padding: 16px 20px; background: var(--surface); border: 1.5px solid #f9a8a8;
    border-radius: var(--radius); color: #b91c1c; font-size: 14px; margin: 16px 0;
  }

  /* Results section */
  #results { margin-top: 40px; animation: fadeUp .3s ease; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

  .course-header { margin-bottom: 24px; padding-bottom: 20px; border-bottom: 1px solid var(--border); }
  .course-title { font-family: 'EB Garamond', serif; font-size: 26px; font-weight: 400; line-height: 1.2; margin-bottom: 8px; }
  .course-meta { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip {
    font-size: 11px; font-weight: 500; padding: 3px 9px; border-radius: 20px;
    display: inline-flex; align-items: center; gap: 4px; letter-spacing: .02em;
  }
  .chip-blue  { background: var(--tag1-bg); color: var(--tag1-fg); }
  .chip-green { background: var(--tag2-bg); color: var(--tag2-fg); }
  .chip-amber { background: var(--tag3-bg); color: var(--tag3-fg); }
  .chip-purple{ background: var(--tag4-bg); color: var(--tag4-fg); }
  .chip-pink  { background: var(--tag5-bg); color: var(--tag5-fg); }

  /* Filters + search bar */
  .table-controls { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; margin-bottom: 16px; }
  .anno-filters { display: flex; gap: 6px; flex-wrap: wrap; }
  .f-btn {
    padding: 5px 14px; font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 400;
    border: 1.5px solid var(--border); border-radius: 20px; background: transparent;
    color: var(--muted); cursor: pointer; transition: all .15s;
  }
  .f-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 500; }
  .f-btn:not(.active):hover { border-color: var(--accent); color: var(--accent); }

  #table-search {
    padding: 7px 12px; font-family: 'DM Sans', sans-serif; font-size: 13px;
    border: 1.5px solid var(--border); border-radius: 8px; background: var(--surface);
    color: var(--text); outline: none; width: 200px; transition: border-color .15s;
  }
  #table-search:focus { border-color: var(--accent); }
  #table-search::placeholder { color: var(--faint); }

  /* Table */
  .table-wrap { border: 1.5px solid var(--border); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); }
  table { width: 100%; border-collapse: collapse; }
  thead { background: var(--surface2); }
  thead th {
    padding: 11px 16px; text-align: left;
    font-size: 10.5px; font-weight: 500; letter-spacing: .07em; text-transform: uppercase;
    color: var(--muted); border-bottom: 1.5px solid var(--border);
  }
  tbody tr { border-bottom: 1px solid var(--border); transition: background .1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--surface2); }
  tbody td { padding: 12px 16px; vertical-align: top; font-size: 14px; line-height: 1.45; }
  .td-cognome { font-weight: 500; }
  .td-nome { font-size: 12px; color: var(--muted); margin-top: 1px; }
  .td-materia { }
  .td-anno { }
  .anno-badge {
    font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 20px;
    display: inline-block; white-space: nowrap;
  }

  .results-footer { margin-top: 10px; font-size: 12px; color: var(--faint); }

  /* No docenti notice */
  .no-docenti {
    padding: 20px; text-align: center; font-size: 13px; color: var(--muted);
    font-style: italic;
  }

  /* Warning box for missing years */
  .warning-box {
    margin-top: 16px; padding: 12px 16px; background: var(--tag3-bg);
    border-radius: 8px; font-size: 13px; color: var(--tag3-fg); line-height: 1.5;
  }

  /* Scrollbar */
  #dropdown::-webkit-scrollbar { width: 6px; }
  #dropdown::-webkit-scrollbar-track { background: transparent; }
  #dropdown::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  @media (max-width: 600px) {
    .page { padding: 28px 16px 60px; }
    h1 { font-size: 26px; }
    .table-controls { flex-direction: column; align-items: flex-start; }
    #table-search { width: 100%; }
    thead th:nth-child(2) { display: none; }
    tbody td:nth-child(2) { display: none; }
  }
</style>
</head>
<body>
<div class="page">

  <header>
    <div class="logo-row">
      <div class="logo-mark"><span>Π</span></div>
      <div class="logo-text">
        <strong>Università di Pisa</strong>
        Catalogo dei Corsi di Studio · A.A. 2024
      </div>
    </div>
    <h1>Trova i <em>docenti</em><br>del tuo corso</h1>
    <p class="subtitle">Seleziona un corso per visualizzare i professori e le materie</p>
  </header>

  <div class="divider"></div>

  <!-- Course selector -->
  <div id="selector-area">
    <div class="search-wrap" id="search-wrap">
      <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" id="corso-search" placeholder="Cerca corso di studio…" autocomplete="off" aria-label="Cerca corso di studio">
      <div id="dropdown"></div>
    </div>
    <div id="selected-course" class="hidden">
      <span id="selected-label"></span>
      <button onclick="clearSelection()" title="Cambia corso">✕</button>
    </div>
  </div>

  <!-- Loading -->
  <div id="loading-courses" class="loader" style="display:none">
    <div class="spinner"></div>
    <span>Caricamento elenco corsi…</span>
  </div>

  <div id="error-area"></div>

  <!-- Results -->
  <div id="results" style="display:none"></div>

</div>

<script>
const API_BASE = 'https://unipi.coursecatalogue.cineca.it';
const GRUPPO = '1709634589846';
const AA = '2024';
const CORS_PROXIES = [
  url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
  url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
  url => `https://thingproxy.freeboard.io/fetch/${url}`,
];

let allCorsi = [];
let selectedCod = null;
let dropdownFocusIdx = -1;

async function apiFetch(path) {
  const url = `${API_BASE}${path}`;
  // Try direct first
  try {
    const r = await fetch(url, { signal: AbortSignal.timeout(5000) });
    if (r.ok) return r.json();
  } catch(_) {}
  // Try proxies in order
  for (const proxy of CORS_PROXIES) {
    try {
      const r = await fetch(proxy(url), { signal: AbortSignal.timeout(8000) });
      if (r.ok) {
        const text = await r.text();
        return JSON.parse(text);
      }
    } catch(_) {}
  }
  throw new Error('Tutti i tentativi di connessione falliti. Riprova più tardi.');
}

const annoColors = [
  ['chip-blue','#1e40af'],
  ['chip-green','#065f46'],
  ['chip-amber','#92400e'],
  ['chip-purple','#5b21b6'],
  ['chip-pink','#9d174d'],
];

// ── Init ──────────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  loadCorsi();
  document.getElementById('corso-search').addEventListener('input', onSearchInput);
  document.getElementById('corso-search').addEventListener('keydown', onSearchKeydown);
  document.getElementById('corso-search').addEventListener('focus', () => {
    if (allCorsi.length) showDropdown(document.getElementById('corso-search').value);
  });
  document.addEventListener('click', e => {
    if (!document.getElementById('search-wrap').contains(e.target)) closeDropdown();
  });
});

// ── Load course list ──────────────────────────────────────────────────────────
async function loadCorsi() {
  show('loading-courses');
  clearError();
  try {
    const data = await apiFetch(`/api/v1/corsi/${AA}?gruppo=${GRUPPO}&limit=500`);
    allCorsi = (Array.isArray(data) ? data : data.items || [])
      .sort((a,b) => a.des_it.localeCompare(b.des_it, 'it'));
    if (!allCorsi.length) throw new Error('Nessun corso trovato');
  } catch(e) {
    showError(`Impossibile caricare l'elenco dei corsi: ${e.message}`);
  } finally {
    hide('loading-courses');
  }
}

// ── Dropdown ──────────────────────────────────────────────────────────────────
function onSearchInput(e) {
  showDropdown(e.target.value);
}

function showDropdown(query) {
  const dd = document.getElementById('dropdown');
  const q = query.trim().toLowerCase();
  const filtered = q
    ? allCorsi.filter(c => c.des_it.toLowerCase().includes(q) || (c.tipo_corso_des_it||'').toLowerCase().includes(q))
    : allCorsi;

  if (!filtered.length) {
    dd.innerHTML = `<div class="dd-empty">Nessun corso trovato</div>`;
  } else {
    dd.innerHTML = filtered.slice(0, 80).map((c, i) => `
      <div class="dd-item" data-cod="${c.cod}" data-idx="${i}" onclick="selectCorso('${c.cod}','${escHtml(c.des_it)}','${escHtml(c.tipo_corso_des_it||'')}')">
        <div>${highlightMatch(c.des_it, q)}</div>
        <div class="tipo">${c.tipo_corso_des_it || ''} · ${c.classe_cod || ''}</div>
      </div>
    `).join('');
  }

  dd.classList.add('open');
  dropdownFocusIdx = -1;
}

function closeDropdown() {
  document.getElementById('dropdown').classList.remove('open');
  dropdownFocusIdx = -1;
}

function onSearchKeydown(e) {
  const dd = document.getElementById('dropdown');
  const items = dd.querySelectorAll('.dd-item');
  if (!dd.classList.contains('open')) return;
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    dropdownFocusIdx = Math.min(dropdownFocusIdx + 1, items.length - 1);
    updateDdFocus(items);
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    dropdownFocusIdx = Math.max(dropdownFocusIdx - 1, 0);
    updateDdFocus(items);
  } else if (e.key === 'Enter' && dropdownFocusIdx >= 0) {
    e.preventDefault();
    items[dropdownFocusIdx].click();
  } else if (e.key === 'Escape') {
    closeDropdown();
  }
}

function updateDdFocus(items) {
  items.forEach((it, i) => it.classList.toggle('focused', i === dropdownFocusIdx));
  if (items[dropdownFocusIdx]) items[dropdownFocusIdx].scrollIntoView({ block: 'nearest' });
}

function highlightMatch(text, q) {
  if (!q) return escHtml(text);
  const idx = text.toLowerCase().indexOf(q);
  if (idx < 0) return escHtml(text);
  return escHtml(text.slice(0, idx))
    + `<strong style="color:var(--accent)">${escHtml(text.slice(idx, idx+q.length))}</strong>`
    + escHtml(text.slice(idx + q.length));
}

// ── Select course ─────────────────────────────────────────────────────────────
function selectCorso(cod, nome, tipo) {
  selectedCod = cod;
  closeDropdown();
  document.getElementById('corso-search').value = '';
  document.getElementById('corso-search').blur();

  const chip = document.getElementById('selected-course');
  document.getElementById('selected-label').textContent = nome;
  chip.classList.remove('hidden');

  loadDocenti(cod, nome, tipo);
}

function clearSelection() {
  selectedCod = null;
  document.getElementById('selected-course').classList.add('hidden');
  document.getElementById('results').style.display = 'none';
  document.getElementById('corso-search').focus();
  clearError();
}

// ── Load professors ───────────────────────────────────────────────────────────
async function loadDocenti(cod, nome, tipo) {
  const resultsDiv = document.getElementById('results');
  resultsDiv.style.display = 'block';
  resultsDiv.innerHTML = `<div class="loader"><div class="spinner"></div><span>Caricamento docenti…</span></div>`;
  clearError();

  try {
    const data = await apiFetch(`/api/v1/corso/${AA}/${cod}`);
    const corso = Array.isArray(data) ? data[0] : data;
    renderResults(corso, nome, tipo);
  } catch(e) {
    resultsDiv.innerHTML = '';
    showError(`Impossibile caricare i dati del corso. (${e.message})`);
  }
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderResults(corso, nome, tipo) {
  const percorsi = corso.percorsi || [];
  const docentiMap = new Map(); // cod → { nome, anni:[{anno, materia}] }
  let anniConDocenti = new Set();
  let anniSenzaDocenti = new Set();

  for (const p of percorsi) {
    for (const annoObj of (p.anni || [])) {
      const anno = annoObj.anno;
      for (const gruppo of (annoObj.insegnamenti || [])) {
        for (const att of (gruppo.attivita || [])) {
          const docenti = att.docenti || [];
          const materia = titolize(att.des_it || '');
          if (docenti.length === 0 && att.statoOfferta !== 'F') {
            anniSenzaDocenti.add(anno);
          }
          for (const d of docenti) {
            anniConDocenti.add(anno);
            anniSenzaDocenti.delete(anno);
            const parts = d.des.split(' ');
            const cognome = parts[0] || '';
            const nomeDoc = parts.slice(1).join(' ') || '';
            const key = d.cod;
            if (!docentiMap.has(key)) {
              docentiMap.set(key, { cognome, nome: nomeDoc, materie: [] });
            }
            const entry = docentiMap.get(key);
            const existing = entry.materie.find(m => m.materia === materia);
            if (!existing) {
              entry.materie.push({ materia, anno });
            } else if (!existing.anni) {
              existing.anni = [existing.anno, anno];
            }
          }
        }
      }
    }
  }

  // Flatten: one row per docente-materia pair
  let rows = [];
  for (const [cod, d] of docentiMap) {
    for (const m of d.materie) {
      rows.push({ cognome: d.cognome, nome: d.nome, materia: m.materia, anno: m.anno });
    }
  }
  rows.sort((a,b) => a.cognome.localeCompare(b.cognome,'it') || a.anno - b.anno);

  const maxAnno = Math.max(...rows.map(r=>r.anno), 0);
  const anni = [...new Set(rows.map(r=>r.anno))].sort();

  let filterAnno = 'tutti';
  let searchQ = '';

  const container = document.getElementById('results');

  function render() {
    const filtered = rows.filter(r => {
      const matchAnno = filterAnno === 'tutti' || r.anno === parseInt(filterAnno);
      const q = searchQ.toLowerCase();
      const matchSearch = !q || r.cognome.toLowerCase().includes(q) || r.nome.toLowerCase().includes(q) || r.materia.toLowerCase().includes(q);
      return matchAnno && matchSearch;
    });

    const badge = (anno) => {
      const [cls] = annoColors[(anno-1) % annoColors.length];
      return `<span class="anno-badge chip ${cls}">Anno ${anno}</span>`;
    };

    const tableHtml = filtered.length ? `
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th style="width:22%">Cognome</th>
              <th style="width:18%">Nome</th>
              <th>Insegnamento</th>
              <th style="width:9%">Anno</th>
            </tr>
          </thead>
          <tbody>
            ${filtered.map(r => `
              <tr>
                <td><div class="td-cognome">${escHtml(cap(r.cognome))}</div></td>
                <td><div class="td-nome">${escHtml(cap(r.nome))}</div></td>
                <td class="td-materia">${escHtml(cap(r.materia))}</td>
                <td class="td-anno">${badge(r.anno)}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
      <div class="results-footer">${filtered.length} docent${filtered.length===1?'e':'i'} mostrat${filtered.length===1?'o':'i'}</div>
    ` : `<div class="table-wrap"><div class="no-docenti">Nessun docente trovato per i filtri selezionati.</div></div>`;

    const warningHtml = anniSenzaDocenti.size > 0
      ? `<div class="warning-box">⚠ Gli anni ${[...anniSenzaDocenti].join(', ')} non hanno ancora docenti assegnati nell'API (probabilmente anni futuri).</div>`
      : '';

    const filtersHtml = `
      <div class="table-controls">
        <div class="anno-filters">
          <button class="f-btn ${filterAnno==='tutti'?'active':''}" onclick="setF('tutti')">Tutti</button>
          ${anni.map(a => `<button class="f-btn ${filterAnno==a?'active':''}" onclick="setF('${a}')">Anno ${a}</button>`).join('')}
        </div>
        <input type="text" id="table-search" placeholder="Filtra per nome o materia…" value="${escAttr(searchQ)}" oninput="setSearch(this.value)">
      </div>
    `;

    container.innerHTML = `
      <div class="course-header">
        <div class="course-title">${escHtml(nome)}</div>
        <div class="course-meta">
          <span class="chip chip-blue">${escHtml(tipo)}</span>
          ${corso.classe_cod ? `<span class="chip chip-green">${escHtml(corso.classe_cod)}</span>` : ''}
          ${corso.durata_it ? `<span class="chip chip-amber">${escHtml(corso.durata_it)}</span>` : ''}
          ${corso.crediti_it ? `<span class="chip chip-purple">${escHtml(corso.crediti_it)} CFU</span>` : ''}
          ${corso.accesso_it ? `<span class="chip chip-pink">${escHtml(corso.accesso_it)}</span>` : ''}
        </div>
      </div>
      ${filtersHtml}
      ${tableHtml}
      ${warningHtml}
    `;

    // Re-bind dynamic controls after re-render
    const ts = document.getElementById('table-search');
    if (ts) {
      ts.addEventListener('input', e => setSearch(e.target.value));
      ts.focus();
    }
  }

  // Expose to inline handlers
  window.setF = (v) => { filterAnno = v; render(); };
  window.setSearch = (v) => { searchQ = v; render(); };

  render();
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function cap(s) {
  if (!s) return '';
  return s.split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase()).join(' ');
}
function titolize(s) {
  if (!s) return '';
  return s.charAt(0).toUpperCase() + s.slice(1).toLowerCase();
}
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) {
  return String(s).replace(/"/g,'&quot;');
}
function show(id) { document.getElementById(id).style.display = 'flex'; }
function hide(id) { document.getElementById(id).style.display = 'none'; }
function clearError() { document.getElementById('error-area').innerHTML = ''; }
function showError(msg) {
  document.getElementById('error-area').innerHTML = `<div class="error-box">⚠ ${msg}</div>`;
}
</script>
</body>
</html>
